<style>
:root{
 --void:#0b0a0f;--void-2:#13121a;--ink:#1a1922;--ink-2:#22212c;
 --line:#2a2934;--line-soft:#1f1e28;
 --cream:#e6e1d6;--cream-dim:#a8a395;--cream-muted:#6e6a5e;
 --brass:#b8974a;--amber:#ff8c00;--ox:#8b1a1a;
 --green:#4ade80;--red:#ef4444;--blue:#60a5fa;--yellow:#fbbf24;
 --paper:#f3eee2;--paper-ink:#1a1611;--paper-rule:#cfc7b3;
 --serif:'Libre Baskerville',Georgia,ui-serif,serif;
 --sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;

}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--void);color:var(--cream);font:14px/1.55 var(--sans);min-height:100dvh;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;background:transparent;border:none;color:inherit}
input,textarea,select{font-family:inherit;background:var(--ink);border:1px solid var(--line);color:var(--cream);border-radius:3px;padding:7px 10px;outline:none;font-size:13px}
input:focus,textarea:focus,select:focus{border-color:var(--brass)}
textarea{resize:vertical;min-height:80px;font-family:var(--mono);font-size:12px;line-height:1.5}
a{color:var(--brass)}a:hover{color:var(--amber)}
.app{min-height:100dvh;display:grid;grid-template-rows:48px 1fr}
header{display:flex;align-items:center;border-bottom:1px solid var(--line);background:var(--void-2);user-select:none}
.brand{display:flex;align-items:center;gap:10px;padding:0 16px;height:100%;border-right:1px solid var(--line)}
.brand .mark{width:28px;height:28px;background:linear-gradient(135deg,var(--brass),var(--amber));border-radius:5px;display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:16px;color:var(--void)}
.brand .name{font-family:var(--serif);font-weight:600;font-size:14px;letter-spacing:0.02em}
.brand .seal{font-family:var(--mono);font-size:9px;color:var(--cream-muted);letter-spacing:0.18em;text-transform:uppercase}
nav.tabs{display:flex;flex:1;overflow-x:auto;align-items:stretch}
nav.tabs button{padding:0 16px;font-size:12px;color:var(--cream-dim);letter-spacing:0.04em;display:flex;align-items:center;gap:6px;border-right:1px solid var(--line-soft);height:100%;white-space:nowrap;border-top:2px solid transparent}
nav.tabs button:hover{background:var(--ink);color:var(--cream)}
nav.tabs button.active{background:var(--ink);color:var(--brass);border-top-color:var(--brass)}
.tools-r{display:flex;align-items:center;gap:5px;padding:0 14px;height:100%;border-left:1px solid var(--line)}
.tool-btn{padding:5px 11px;border-radius:3px;font-size:11px;color:var(--cream-dim);letter-spacing:0.06em;text-transform:uppercase;font-family:var(--mono);border:1px solid var(--line)}
.tool-btn:hover{background:var(--ink);color:var(--cream);border-color:var(--brass)}
main{padding:18px 22px 60px;overflow-y:auto;max-width:1320px;margin:0 auto;width:100%}
.disclaimer{background:rgba(139,26,26,0.15);border:1px solid var(--ox);border-left:3px solid var(--ox);border-radius:3px;padding:12px 16px;margin-bottom:18px;font-size:12px;color:var(--cream)}
.disclaimer strong{color:var(--brass)}
.section-h{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;gap:14px;flex-wrap:wrap}
.section-h h2{font-family:var(--serif);font-size:18px;font-weight:600;letter-spacing:0.01em}
.section-h .sub{font-family:var(--mono);font-size:11px;color:var(--cream-muted);letter-spacing:0.08em;text-transform:uppercase}
.section-h .actions{display:flex;gap:6px;flex-wrap:wrap}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card{background:var(--void-2);border:1px solid var(--line);border-radius:4px;padding:16px 18px}

.kpi{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px dashed var(--line-soft);font-size:13px}
.kpi:last-child{border-bottom:none}
.kpi .l{color:var(--cream-dim)}
.kpi .v{font-family:var(--mono);color:var(--cream);font-weight:500}
.kpi .v.green{color:var(--green)}.kpi .v.amber{color:var(--amber)}.kpi .v.brass{color:var(--brass)}

.field label{display:block;font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:3px}
.field input,.field select,.field textarea{width:100%}
.btn{padding:7px 14px;border:1px solid var(--brass);border-radius:3px;font-size:12px;color:var(--cream);background:transparent;letter-spacing:0.04em;cursor:pointer}
.btn:hover{border-color:var(--amber);color:var(--amber)}
.btn.primary{background:var(--brass);color:var(--void);border-color:var(--brass);font-weight:600}
.btn.primary:hover{background:var(--amber);border-color:var(--amber);color:var(--void)}

.btn.ghost{border-color:var(--line);color:var(--cream-dim)}
.btn.ghost:hover{border-color:var(--brass);color:var(--brass)}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
th,td{padding:7px 10px;border-bottom:1px solid var(--line-soft);text-align:left}
th{color:var(--brass);font-family:var(--mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;font-weight:600}
td.r{text-align:right;font-family:var(--mono)}
.tag{display:inline-block;padding:2px 7px;border-radius:11px;font-family:var(--mono);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;border:1px solid var(--brass);color:var(--brass);margin-right:4px}
.tag.green{border-color:var(--green);color:var(--green)}
.tag.amber{border-color:var(--amber);color:var(--amber)}
.tag.red{border-color:var(--red);color:var(--red)}
.tag.blue{border-color:var(--blue);color:var(--blue)}
.tag.muted{border-color:var(--line);color:var(--cream-muted)}
.doc-stage{display:grid;grid-template-columns:280px 1fr;gap:14px}
@media (max-width:920px){.doc-stage{grid-template-columns:1fr}}
.doc-side{display:flex;flex-direction:column;gap:10px}
.paper{background:var(--paper);color:var(--paper-ink);font-family:var(--serif);font-size:13px;line-height:1.7;padding:48px 56px;border-radius:4px;box-shadow:0 6px 28px rgba(0,0,0,0.55);min-height:600px;max-width:820px;margin:0 auto;width:100%}
@media (max-width:600px){.paper{padding:28px 22px;font-size:12px}}
.paper h1{font-family:var(--serif);font-size:22px;font-weight:700;text-align:center;margin-bottom:6px;letter-spacing:0.02em}
.paper h2{font-family:var(--serif);font-size:16px;font-weight:700;margin:22px 0 8px;border-bottom:1px solid var(--paper-rule);padding-bottom:4px;color:#3a1e10}
.paper h3{font-family:var(--serif);font-size:14px;font-weight:700;margin:16px 0 6px;font-style:italic}
.paper p{margin:8px 0;text-align:justify}
.paper ul,.paper ol{margin:8px 0 8px 22px}
.paper li{margin:3px 0}
.paper .doc-meta{text-align:center;font-size:11px;color:#6a5a40;font-family:var(--mono);letter-spacing:0.08em;margin-bottom:18px}
.paper .sig-block{margin-top:30px;display:grid;grid-template-columns:1fr 1fr;gap:30px;font-size:12px}
.paper .sig-line{border-bottom:1px solid var(--paper-ink);min-height:38px;margin-bottom:4px}
.paper table{font-family:var(--sans);font-size:12px;color:var(--paper-ink);margin:10px 0}
.paper th,.paper td{border:1px solid var(--paper-rule);padding:6px 9px;color:var(--paper-ink)}
.paper th{background:#e6dec6;font-family:var(--sans);text-transform:none;letter-spacing:normal;color:#3a1e10;font-weight:700}
.paper .clause-locked{background:#efe7d2;border-left:3px solid #8b1a1a;padding:8px 12px;margin:8px 0;font-size:12px;font-style:italic}
.paper .clause-locked::before{content:'◊ regulatory clause · locked · ';font-family:var(--mono);font-size:9px;color:#8b1a1a;letter-spacing:0.08em;text-transform:uppercase;font-style:normal}
.paper .placeholder-empty{background:#ffe9b3;color:#8b1a1a;padding:0 4px;border-radius:2px;font-weight:700}
.paper hr{border:none;border-top:1px solid var(--paper-rule);margin:14px 0}
.tpl-list{display:flex;flex-direction:column;gap:5px}
.tpl-row{padding:9px 12px;border:1px solid var(--line);border-radius:3px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;background:var(--void-2)}
.tpl-row:hover{border-color:var(--brass)}
.tpl-row.active{border-color:var(--brass);background:var(--ink)}
.tpl-row .nm{font-family:var(--serif);font-size:13px;color:var(--cream)}
.tpl-row .sub{font-family:var(--mono);font-size:9px;color:var(--cream-muted);letter-spacing:0.08em;text-transform:uppercase}
.section-edit{background:var(--ink);border:1px solid var(--line);border-radius:3px;padding:10px 12px;margin-bottom:8px}
.section-edit .hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.section-edit .hd .nm{font-family:var(--serif);font-size:13px;color:var(--brass);font-weight:600}
.section-edit .hd .tg{font-family:var(--mono);font-size:9px;color:var(--cream-muted);letter-spacing:0.08em;text-transform:uppercase}
.section-edit textarea{width:100%;background:var(--void);border:1px solid var(--line-soft)}
.section-edit.locked{border-color:var(--ox)}
.section-edit.locked .nm::before{content:'◊ ';color:var(--ox)}
.section-edit.locked textarea{opacity:0.7;cursor:not-allowed}
.audit-row{padding:6px 10px;font-family:var(--mono);font-size:10px;color:var(--cream-dim);border-bottom:1px dashed var(--line-soft);display:grid;grid-template-columns:90px 110px 1fr 100px;gap:8px}
.audit-row:hover{background:var(--ink)}
.chat{display:flex;flex-direction:column;gap:10px;max-height:60vh;overflow-y:auto;padding:6px}
.msg{padding:10px 14px;border-radius:6px;max-width:88%;font-size:13px;line-height:1.55;white-space:pre-wrap}
.msg.user{background:var(--ink);align-self:flex-end;border-bottom-right-radius:2px}
.msg.bot{background:var(--void-2);border:1px solid var(--line);border-left:2px solid var(--brass);align-self:flex-start;border-bottom-left-radius:2px}
.msg.bot .src{font-family:var(--mono);font-size:10px;color:var(--cream-muted);letter-spacing:0.08em;margin-top:6px;padding-top:6px;border-top:1px dashed var(--line)}
.chat-input{display:flex;gap:8px;margin-top:10px}
.chat-input input{flex:1;padding:11px 14px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;padding:18px;z-index:900;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal{background:var(--void-2);border:1px solid var(--brass);border-radius:4px;padding:22px;max-width:620px;width:100%;max-height:90vh;overflow:auto}
.modal h2{font-family:var(--serif);font-size:17px;margin-bottom:14px}
.modal .actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--brass);color:var(--void);padding:9px 18px;border-radius:3px;font-family:var(--mono);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;font-weight:700;opacity:0;transition:all 0.22s;z-index:1100;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{padding:40px 22px;text-align:center;border:1px dashed var(--line);border-radius:4px;color:var(--cream-dim)}
.empty h3{font-family:var(--serif);font-size:16px;color:var(--cream);margin-bottom:8px}
.empty p{font-size:12px;margin:6px 0}
.pill{display:inline-block;padding:2px 8px;border-radius:11px;font-family:var(--mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase}
.pill.draft{background:var(--line);color:var(--cream-dim)}
.pill.issued{background:rgba(184,151,74,0.2);color:var(--brass);border:1px solid var(--brass)}
.pill.signed{background:rgba(74,222,128,0.15);color:var(--green);border:1px solid var(--green)}
.req-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.req-list .req{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:11px;letter-spacing:0.05em;text-transform:uppercase}
.req-list .req.ok{background:rgba(74,222,128,0.15);color:var(--green)}
.req-list .req.miss{background:rgba(239,68,68,0.15);color:var(--red)}
@media (max-width:760px){nav.tabs button{padding:0 11px;font-size:11px}main{padding:14px 14px 50px}.row,.row-3{grid-template-columns:1fr}.grid-2{grid-template-columns:1fr}}
</style>
</head>

<div class="app">
<header>
 <div class="brand">
 <div class="mark">◊</div>
 <div><div class="name" id="brandName">FallBooksPaper</div></div>
 <div class="seal">v1 · prime 797</div>
 </div>
 <nav class="tabs" id="tabNav"></nav>
 <div class="tools-r">
 <button class="tool-btn" id="tierBadge" onclick="openModal('settings')">T0</button>
 <button class="tool-btn" onclick="openModal('settings')">&#9881;</button>
 </div>
</header>
<main id="view"></main>
</div>
<div class="modal-bg" id="modal"><div class="modal"><h2 id="modalTitle">&middot;</h2><div id="modalBody"></div></div></div>

<script id="app-script">
'use strict';
// ════════════════════════════════════════════════════════════════
// FallBooksPaper v1.0.0 · sovereign accountancy document generator
// prime 797 · MIT · 14 templates · bundle: fallbooks
// Client data never leaves the device.
// ════════════════════════════════════════════════════════════════
const TOOLNAME='fallbookspaper';
const VERSION='1.0.0';
const PRIME=797;
const STORE='fallbookspaper-v1';
const SCHEMA_VERSION='1.0';

const TABS=[
 {id:'dashboard', name:'Dashboard', ico:'◐'},
 {id:'clients', name:'Clients', ico:'◊'},
 {id:'generate', name:'Generate', ico:'△'},
 {id:'library', name:'Library', ico:'▦'},
 {id:'templates', name:'Templates', ico:'✆'},
 {id:'firm', name:'Firm', ico:'⌂'},
 {id:'audit', name:'Audit', ico:'◯'},
 {id:'help', name:'Q & A', ico:'?'},
];

let state={
 active:'dashboard',
 brandName:'FallBooksPaper',
 firm:null,
 advisers:[],
 clients:[],
 documents:[],
 templates:[],
 audit:[],
 ui:{
 selectedClientId:null,
 selectedTemplateId:'engagement-letter',
 selectedDocumentId:null,
 activeAdviserId:null,
 libFilterClient:'',
 libFilterTpl:'',
 libFilterStatus:'',
 fallbooksCompute:null,
 sectionOverrides:{},
 extraContext:{},
 chat:[],
 },
 settings:{anthropicKey:'',auditChain:true,autoBroadcast:true},
};

const $=(s,p=document)=>p.querySelector(s);
const $$=(s,p=document)=>Array.from(p.querySelectorAll(s));
const uid=(p='id')=>p+'_'+Math.random().toString(36).slice(2,11);
const now=()=>Date.now();
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt=n=>(+n||0).toLocaleString('en-GB',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmt2=n=>(+n||0).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2});
const money=n=>'£'+fmt(n);
const dateStr=ts=>{if(!ts)return '—';const d=new Date(ts);return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})};
const dateTime=ts=>{if(!ts)return '—';const d=new Date(ts);return d.toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})};
const isoDate=ts=>{if(!ts)return '';const d=new Date(ts);return d.toISOString().slice(0,10)};

function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),1900)}
async function sha256(s){const buf=new TextEncoder().encode(s);const h=await crypto.subtle.digest('SHA-256',buf);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')}

// IDB · stores per shared schema: firms, advisers, clients, documents, templates, audit, state
let db;
function openDB(){
 return new Promise((res,rej)=>{
 const r=indexedDB.open(STORE,1);
 r.onupgradeneeded=e=>{
 const d=e.target.result;
 ['firms','advisers','clients','documents','templates','audit','state'].forEach(s=>{
 if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:s==='state'?undefined:'id'});
 });
 };
 r.onsuccess=e=>{db=e.target.result;res(db)};
 r.onerror=rej;
 });
}
function idbGetAll(store){return new Promise(res=>{const tx=db.transaction(store,'readonly');const q=tx.objectStore(store).getAll();q.onsuccess=()=>res(q.result||[]);q.onerror=()=>res([])})}
function idbGet(store,key){return new Promise(res=>{const tx=db.transaction(store,'readonly');const q=tx.objectStore(store).get(key);q.onsuccess=()=>res(q.result);q.onerror=()=>res(null)})}
function idbPut(store,val,key){return new Promise(res=>{const tx=db.transaction(store,'readwrite');const o=tx.objectStore(store);const q=key!=null?o.put(val,key):o.put(val);q.onsuccess=()=>res(true);q.onerror=()=>res(false)})}
function idbDel(store,key){return new Promise(res=>{const tx=db.transaction(store,'readwrite');tx.objectStore(store).delete(key);tx.oncomplete=()=>res(true)})}

async function loadAll(){
 if(!db)await openDB();
 const [firms,advisers,clients,documents,templates,audit,uiState]=await Promise.all([
 idbGetAll('firms'),idbGetAll('advisers'),idbGetAll('clients'),
 idbGetAll('documents'),idbGetAll('templates'),idbGetAll('audit'),
 idbGet('state','ui'),
 ]);
 state.firm=firms[0]||null;
 state.advisers=advisers;
 state.clients=clients;
 state.documents=documents;
 state.audit=audit.sort((a,b)=>a.i-b.i);
 state.templates=mergeTemplates(templates);
 if(uiState){
 state.ui=Object.assign({},state.ui,uiState.value||{});
 state.brandName=uiState.brand||'FallBooksPaper';
 state.settings=Object.assign({},state.settings,uiState.settings||{});
 }
}
async function persistUI(){if(!db)await openDB();await idbPut('state',{value:state.ui,brand:state.brandName,settings:state.settings},'ui')}

// AUDIT chain · P3 · 7yr retention (HMRC 6 + ICAEW 7)
async function audit(action,opts={}){
 if(!state.settings.auditChain)return;
 if(!db)await openDB();
 const prev=state.audit.length?state.audit[state.audit.length-1]:null;
 const prevHash=prev?prev.docHash:'';
 const i=(prev?prev.i:0)+1;
 const payload=opts.payload||{};
 const entry={id:uid('au'),i,ts:now(),tool:TOOLNAME,adviserId:opts.adviserId||state.ui.activeAdviserId||'',clientId:opts.clientId||'',action,reasoning:opts.reasoning||'',configVersion:TOOLNAME+'@'+VERSION,prevHash,docHash:'',payload};
 entry.docHash=await sha256(JSON.stringify({i,ts:entry.ts,action,clientId:entry.clientId,prevHash,payload}));
 state.audit.push(entry);
 await idbPut('audit',entry);
}

// BUNDLE MESH · fall-books (anchor channel) + fall-signal
let bcBooks,bcSignal;
let bcDebounce={};
function broadcast(channel,type,payload){if(!state.settings.autoBroadcast||!channel)return;try{channel.postMessage({v:1,type,ts:now(),source:TOOLNAME,payload})}catch(e){}}
function debouncedBroadcast(key,channel,type,payload){clearTimeout(bcDebounce[key]);bcDebounce[key]=setTimeout(()=>broadcast(channel,type,payload),300)}

async function initMesh(){
 try{
 bcSignal=new BroadcastChannel('fall-signal');
 bcSignal.postMessage({source:TOOLNAME,type:'hello',prime:PRIME,version:VERSION,ts:now()});
 bcSignal.addEventListener('message',e=>{const m=e.data;if(!m)return;if(m.type==='ping')bcSignal.postMessage({source:TOOLNAME,type:'pong',prime:PRIME})});
 }catch(e){}
 try{
 bcBooks=new BroadcastChannel('fall-books');
 bcBooks.addEventListener('message',handleBooksMessage);
 bcBooks.postMessage({v:1,type:'sync.request',ts:now(),source:TOOLNAME,payload:{wants:['clients','advisers','firm']}});
 }catch(e){}
}

async function handleBooksMessage(e){
 const m=e.data;if(!m||m.source===TOOLNAME)return;
 let dirty=false;
 if(m.type==='client.created'||m.type==='client.updated'){
 const c=m.payload;if(c&&c.id){
 const idx=state.clients.findIndex(x=>x.id===c.id);
 const existing=idx>=0?state.clients[idx]:null;
 if(!existing||(c.updatedAt||0)>=(existing.updatedAt||0)){
 if(idx>=0)state.clients[idx]=c;else state.clients.push(c);
 await idbPut('clients',c);dirty=true;
 }
 }
 }else if(m.type==='client.archived'){
 const c=m.payload;if(c&&c.id){const idx=state.clients.findIndex(x=>x.id===c.id);if(idx>=0){state.clients[idx]=c;await idbPut('clients',c);dirty=true}}
 }else if(m.type==='adviser.created'||m.type==='adviser.updated'){
 const a=m.payload;if(a&&a.id){const idx=state.advisers.findIndex(x=>x.id===a.id);if(idx>=0)state.advisers[idx]=a;else state.advisers.push(a);await idbPut('advisers',a);dirty=true}
 }else if(m.type==='firm.updated'){
 const f=m.payload;if(f){state.firm=f;await idbPut('firms',f);dirty=true}
 }else if(m.type==='sync.request'){
 bcBooks.postMessage({v:1,type:'sync.snapshot',ts:now(),source:TOOLNAME,payload:{clients:state.clients,advisers:state.advisers,firm:state.firm}});
 }else if(m.type==='sync.snapshot'){
 const p=m.payload||{};
 if(Array.isArray(p.clients))for(const c of p.clients){const idx=state.clients.findIndex(x=>x.id===c.id);const ex=idx>=0?state.clients[idx]:null;if(!ex||(c.updatedAt||0)>=(ex.updatedAt||0)){if(idx>=0)state.clients[idx]=c;else state.clients.push(c);await idbPut('clients',c);dirty=true}}
 if(Array.isArray(p.advisers))for(const a of p.advisers){const idx=state.advisers.findIndex(x=>x.id===a.id);const ex=idx>=0?state.advisers[idx]:null;if(!ex||(a.updatedAt||0)>=(ex.updatedAt||0)){if(idx>=0)state.advisers[idx]=a;else state.advisers.push(a);await idbPut('advisers',a);dirty=true}}
 if(p.firm&&(!state.firm||(p.firm.updatedAt||0)>(state.firm.updatedAt||0))){state.firm=p.firm;await idbPut('firms',p.firm);dirty=true}
 }else if(m.type==='fallbooks.compute.response'){
 // FallBooks anchor returns computation payload for SA/CT/VAT
 state.ui.fallbooksCompute=m.payload||null;
 toast('compute response · fallbooks');
 render();
 }else if(m.type==='deadline.created'||m.type==='deadline.updated'){
 // informational — refresh if client matches
 if(m.payload&&m.payload.clientId)dirty=true;
 }
 if(dirty)render();
}

function requestFallbooksCompute(clientId,kind,year){
 if(!bcBooks){toast('mesh not ready');return}
 bcBooks.postMessage({v:1,type:'fallbooks.compute.request',ts:now(),source:TOOLNAME,payload:{clientId,kind,year}});
 toast('compute request → fallbooks');
}

async function emitClientUpdate(client){if(!bcBooks)return;debouncedBroadcast('client-'+client.id,bcBooks,'client.updated',client)}
async function emitFirmUpdate(){if(!bcBooks||!state.firm)return;debouncedBroadcast('firm',bcBooks,'firm.updated',state.firm)}
async function emitAdviserUpdate(a){if(!bcBooks)return;debouncedBroadcast('adv-'+a.id,bcBooks,'adviser.updated',a)}
async function emitDocCreated(doc){if(!bcBooks)return;broadcast(bcBooks,'document.created',doc);broadcast(bcBooks,'engagement.signed',doc)}

function mergeTemplates(customs){
 const map=new Map();
 for(const t of TEMPLATES_BUILTIN)map.set(t.id,JSON.parse(JSON.stringify(t)));
 for(const c of customs||[]){
 const base=map.get(c.id);
 if(!base){map.set(c.id,c);continue}
 if(c.sectionOverrides){
 for(const sec of base.sections){
 if(sec.locked)continue;
 if(c.sectionOverrides[sec.id]!=null)sec.body=c.sectionOverrides[sec.id];
 }
 }
 base._custom=true;
 }
 return Array.from(map.values());
}

function interpolate(body,ctx){
 return body.replace(/\{\{([a-zA-Z0-9_.]+)\}\}/g,function(_,path){
 const v=getPath(ctx,path);
 if(v==null||v==='')return '<span class="placeholder-empty">{{'+path+'}}</span>';
 if(Array.isArray(v))return v.join(', ');
 return String(v);
 });
}
function inlineMd(s){return s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/_([^_]+)_/g,'<em>$1</em>')}
function md2html(s){
 if(!s)return '';
 s=s.replace(/\[SIGNATURE_BLOCK\]/g,'<div class="sig-block"><div><div class="sig-line"></div>Signed (client)<br>Date: ________________</div><div><div class="sig-line"></div>Signed (firm)<br>Date: ________________</div></div>');
 s=s.replace(/(^\|.+\|$\n?){2,}/gm,function(block){
 const lines=block.trim().split('\n');
 if(lines.length<2)return block;
 const headers=lines[0].split('|').slice(1,-1).map(c=>c.trim());
 const align=lines[1].split('|').slice(1,-1).map(c=>c.trim().endsWith(':')?'right':'left');
 const rows=lines.slice(2).map(l=>l.split('|').slice(1,-1).map(c=>c.trim()));
 const ths=headers.map((h,i)=>'<th style="text-align:'+align[i]+'">'+inlineMd(h)+'</th>').join('');
 const trs=rows.map(r=>'<tr>'+r.map((c,i)=>'<td style="text-align:'+(align[i]||'left')+'">'+inlineMd(c)+'</td>').join('')+'</tr>').join('');
 return '<table><thead><tr>'+ths+'</tr></thead><tbody>'+trs+'</tbody></table>';
 });
 const lines=s.split('\n');
 let html='';let inList=null;
 for(let i=0;i<lines.length;i++){
 const ln=lines[i];
 const mUl=ln.match(/^\s*[-*]\s+(.*)$/);
 const mOl=ln.match(/^\s*\d+\.\s+(.*)$/);
 const mH2=ln.match(/^##\s+(.*)$/);
 if(mH2){if(inList){html+='</'+inList+'>';inList=null}html+='<h3>'+inlineMd(mH2[1])+'</h3>'}
 else if(mUl){if(inList!=='ul'){if(inList)html+='</'+inList+'>';html+='<ul>';inList='ul'}html+='<li>'+inlineMd(mUl[1])+'</li>'}
 else if(mOl){if(inList!=='ol'){if(inList)html+='</'+inList+'>';html+='<ol>';inList='ol'}html+='<li>'+inlineMd(mOl[1])+'</li>'}
 else{
 if(inList){html+='</'+inList+'>';inList=null}
 if(ln.trim()==='')html+='';
 else if(ln.trim().startsWith('<'))html+=ln;
 else html+='<p>'+inlineMd(ln)+'</p>';
 }
 }
 if(inList)html+='</'+inList+'>';
 return html;
}

function renderTemplate(tplId,clientId,extra){
 const tpl=state.templates.find(t=>t.id===tplId);
 if(!tpl)return {html:'',markdown:'',missing:[]};
 const ctx=buildContext(clientId,extra);
 const overrides=(state.ui.sectionOverrides||{})[tplId]||{};
 let html='<h1>'+esc(tpl.name)+'</h1>';
 html+='<div class="doc-meta">'+esc(tpl.cobs||'')+' · '+esc(ctx.today)+' · '+esc(state.firm?state.firm.name:'')+'</div>';
 let md='# '+tpl.name+'\n\n_'+(tpl.cobs||'')+' · '+ctx.today+'_\n\n';
 const missing=[];
 for(const sec of tpl.sections){
 if(sec.requiredFields){
 for(const f of sec.requiredFields){
 const v=getPath(ctx,f);
 if(v==null||v==='')missing.push(f);
 }
 }
 const rawBody=overrides[sec.id]!=null?overrides[sec.id]:sec.body;
 const interp=interpolate(rawBody,ctx);
 const sechtml=md2html(interp);
 if(sec.heading)html+='<h2>'+esc(sec.heading)+'</h2>';
 if(sec.locked)html+='<div class="clause-locked">'+sechtml+'</div>';
 else html+=sechtml;
 if(sec.heading)md+='## '+sec.heading+'\n\n';
 md+=interp.replace(/<[^>]+>/g,'')+'\n\n';
 }
 return {html, markdown:md, missing};
}
